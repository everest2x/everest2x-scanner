<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Everest2X Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    .wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 12px;
    }

    h2 {
      margin: 8px 0 10px;
      font-size: 22px;
    }

    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      margin: 10px 0;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      margin-top: 8px;
      font-size: 15px;
    }

    .btn-start {
      background: #1a73e8;
    }

    .btn-stop {
      background: #d93025;
    }

    .btn-focus {
      background: #188038;
    }

    #msg {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      white-space: pre-wrap;
    }

    .warn {
      background: #fbbc04;
      color: #111;
    }

    .ok {
      background: #34a853;
      color: white;
    }

    .err {
      background: #d93025;
      color: white;
    }

    .hidden {
      display: none !important;
    }

    .small {
      font-size: 12px;
      color: #ccc;
      margin-top: 8px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Everest2X scanner</h2>

    <div id="reader"></div>

    <button id="startBtn" class="btn btn-start">Kamera indítása</button>
    <button id="stopBtn" class="btn btn-stop hidden">Scannelés megszakítása</button>
    <button id="focusBtn" class="btn btn-focus hidden">Autofókusz</button>

    <div id="msg" class="warn">Scanner előkészítése...</div>

    <div class="small">
      A sikeres beolvasás után a kód visszakerül az Everest2X főoldalra.
    </div>
  </div>

  <script>
    let qrScanner = null;
    let isRunning = false;
    let closeSignalSent = false;
    let autoStartTried = false;
    let scanHintTimer = null;
    let focusApplied = false;

    function postToOpener(payload) {
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(
            Object.assign({ source: "everest2x-scanner" }, payload),
            "*"
          );
        }
      } catch (e) {
        console.warn("postMessage hiba:", e);
      }
    }

    function setMsg(text, cls) {
      const m = document.getElementById("msg");
      if (!m) return;

      if (!text) {
        m.className = "hidden";
        m.innerText = "";
        return;
      }

      m.className = cls || "warn";
      m.innerText = text;
    }

    function refreshCloseButtonLabel() {
      const stopBtn = document.getElementById("stopBtn");
      if (!stopBtn) return;

      stopBtn.innerText = isRunning ? "Scannelés megszakítása" : "Bezárás";
    }

    function refreshFocusButton() {
      const btn = document.getElementById("focusBtn");
      if (!btn) return;

      if (isRunning) {
        btn.classList.remove("hidden");
        btn.disabled = false;
        btn.style.opacity = "1";
        btn.style.cursor = "pointer";
        btn.innerText = focusApplied ? "Autofókusz újra" : "Autofókusz";
      } else {
        btn.classList.add("hidden");
      }
    }

    function clearScanHintTimer() {
      if (scanHintTimer) {
        clearTimeout(scanHintTimer);
        scanHintTimer = null;
      }
    }

    function checkOpenedFromApp() {
      const hasOpener = !!(window.opener && !window.opener.closed);

      if (!hasOpener) {
        setMsg(
          "ℹ️ Ez a scanner önállóan lett megnyitva.\nAz Everest2X alkalmazásból indítsd a beolvasást.",
          "err"
        );

        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        const focusBtn = document.getElementById("focusBtn");

        if (startBtn) {
          startBtn.disabled = true;
          startBtn.style.opacity = "0.6";
          startBtn.style.cursor = "not-allowed";
          startBtn.innerText = "Kamera indítása (csak az alkalmazásból)";
        }

        if (stopBtn) stopBtn.classList.add("hidden");
        if (focusBtn) focusBtn.classList.add("hidden");

        return false;
      }

      return true;
    }

    function postCloseSignalOnce(payload) {
      if (closeSignalSent) return false;
      closeSignalSent = true;
      postToOpener(payload);
      return true;
    }

    async function triggerAutoFocus() {
      if (!qrScanner || !isRunning) {
        setMsg("ℹ️ Előbb indítsd el a kamerát.", "warn");
        return;
      }

      const btn = document.getElementById("focusBtn");
      if (btn) {
        btn.disabled = true;
        btn.style.opacity = "0.7";
        btn.style.cursor = "wait";
        btn.innerText = "Fókuszálás...";
      }

      try {
        const caps = qrScanner.getRunningTrackCapabilities?.() || {};

        if (
          Array.isArray(caps.focusMode) &&
          caps.focusMode.includes("continuous")
        ) {
          await qrScanner.applyVideoConstraints({
            advanced: [{ focusMode: "continuous" }]
          });
          focusApplied = true;
          setMsg("✅ Autofókusz bekapcsolva.", "ok");
        } else if (
          Array.isArray(caps.focusMode) &&
          caps.focusMode.includes("single-shot")
        ) {
          await qrScanner.applyVideoConstraints({
            advanced: [{ focusMode: "single-shot" }]
          });
          focusApplied = true;
          setMsg("✅ Egyszeri autofókusz lefutott.", "ok");
        } else {
          setMsg(
            "ℹ️ Ezen az eszközön a webes fókuszvezérlés nem támogatott.",
            "warn"
          );
        }
      } catch (e) {
        setMsg(
          "❌ Autofókusz nem sikerült: " + (e && e.message ? e.message : String(e)),
          "err"
        );
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.style.opacity = "1";
          btn.style.cursor = "pointer";
          btn.innerText = focusApplied ? "Autofókusz újra" : "Autofókusz";
        }
      }
    }

    async function startScanner() {
      if (!checkOpenedFromApp()) return;
      if (isRunning) return;

      const startBtnEl = document.getElementById("startBtn");
      const stopBtnEl = document.getElementById("stopBtn");

      focusApplied = false;
      refreshFocusButton();

      if (startBtnEl) {
        startBtnEl.innerText = "Kamera indítása";
      }

      if (startBtnEl) startBtnEl.classList.add("hidden");
      if (stopBtnEl) stopBtnEl.classList.remove("hidden");

      setMsg("📷 Kamera megnyitása...", "warn");

      try {
        if (qrScanner) {
          try {
            await qrScanner.stop();
          } catch (e) {}
          try {
            qrScanner.clear();
          } catch (e) {}
          qrScanner = null;
        }

        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          throw new Error("Nincs elérhető kamera.");
        }

        let cam =
          cameras.find(c => /back|rear|environment/i.test(c.label || "")) ||
          cameras[cameras.length - 1];

        setMsg("📷 Kamera indítása...", "warn");

        qrScanner = new Html5Qrcode("reader");
        isRunning = true;
        refreshCloseButtonLabel();
        refreshFocusButton();

        await qrScanner.start(
          { deviceId: { exact: cam.id } },
          { fps: 10, qrbox: 250 },
          async (decodedText) => {
            if (!isRunning) return;

            isRunning = false;
            clearScanHintTimer();
            refreshCloseButtonLabel();
            refreshFocusButton();

            setMsg("✅ QR beolvasva, küldés a főoldalra...", "ok");

            document.getElementById("stopBtn")?.classList.add("hidden");
            document.getElementById("startBtn")?.classList.add("hidden");
            document.getElementById("focusBtn")?.classList.add("hidden");

            postCloseSignalOnce({
              type: "SCAN_SUCCESS",
              qrText: decodedText
            });

            setTimeout(async () => {
              try {
                if (qrScanner) await qrScanner.stop();
              } catch (e) {}
              try {
                if (qrScanner) qrScanner.clear();
              } catch (e) {}
              qrScanner = null;

              try {
                window.close();
              } catch (e) {}
            }, 50);
          }
        );

        refreshFocusButton();
        setMsg("📷 Irányítsd a kamerát a QR kódra...", "warn");

        clearScanHintTimer();
        scanHintTimer = setTimeout(() => {
          if (isRunning) {
            setMsg(
              "⏳ Még nincs beolvasás.\nIrányítsd a kamerát a QR kódra, vagy nyomj megszakítást és próbáld újra.",
              "warn"
            );
          }
        }, 30000);
      } catch (err) {
        isRunning = false;
        clearScanHintTimer();
        refreshCloseButtonLabel();
        refreshFocusButton();

        const code = err && err.name ? err.name : "";
        const text = err && err.message ? err.message : String(err);

        let hint = "";
        if (code === "NotAllowedError") hint = " (Kamera engedély tiltva.)";
        else if (code === "NotReadableError") hint = " (A kamera foglalt.)";
        else if (code === "OverconstrainedError") hint = " (Nem elérhető kamera mód.)";

        setMsg(
          `❌ Kamera hiba${hint}\n${code ? code + ": " : ""}${text}`,
          "err"
        );

        const startBtnRetry = document.getElementById("startBtn");
        const stopBtnRetry = document.getElementById("stopBtn");

        if (startBtnRetry) {
          startBtnRetry.classList.remove("hidden");
          startBtnRetry.disabled = false;
          startBtnRetry.style.opacity = "1";
          startBtnRetry.style.cursor = "pointer";
          startBtnRetry.innerText = "Újrapróbálás";
        }

        if (stopBtnRetry) {
          stopBtnRetry.classList.add("hidden");
        }
      }
    }

    async function stopScanner() {
      isRunning = false;
      clearScanHintTimer();
      refreshCloseButtonLabel();
      refreshFocusButton();

      try {
        if (qrScanner) {
          try {
            await qrScanner.stop();
          } catch (e) {}
          try {
            qrScanner.clear();
          } catch (e) {}
          qrScanner = null;
        }
      } catch (e) {}

      postCloseSignalOnce({ type: "SCAN_CANCELLED" });

      setTimeout(() => window.close(), 150);
    }

    document.getElementById("startBtn").addEventListener("click", startScanner);
    document.getElementById("stopBtn").addEventListener("click", stopScanner);
    document.getElementById("focusBtn").addEventListener("click", triggerAutoFocus);

    window.addEventListener("beforeunload", () => {
      postCloseSignalOnce({ type: "SCAN_CANCELLED" });
    });

    const openedFromApp = checkOpenedFromApp();

    if (openedFromApp) {
      setTimeout(() => {
        if (!autoStartTried && !isRunning) {
          autoStartTried = true;
          startScanner();
        }
      }, 150);
    }
  </script>
</body>
</html>
